<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1e">
<title>Da Goat Summer HQ</title>
<style>
:root{--gold:#FFD700;--dark:#0a0f1e;--card:rgba(0,0,0,0.75);--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:#fff;min-height:100%;background:#0a0f1e;overflow-x:hidden;}

/* BG: uses a real div behind everything, NOT position:fixed */
#bg-wrap{position:absolute;top:0;left:0;width:100%;min-height:100%;z-index:0;overflow:hidden;}
.bg-slide{position:absolute;top:0;left:0;width:100%;height:100%;min-height:100vh;background-size:cover;background-position:center top;opacity:0;transition:opacity 1.8s ease;}
.bg-slide.active{opacity:1;}
.bg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;min-height:100vh;background:rgba(5,8,20,0.82);z-index:1;}

/* Everything above bg */
#root{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;}

/* ===== LOGIN ===== */
#ls{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(2rem + var(--sat)) 1.25rem calc(2rem + var(--sab));min-height:100vh;}
.l-logo{font-size:clamp(52px,13vw,76px);margin-bottom:.4rem;text-align:center;}
.l-title{font-size:clamp(19px,5.5vw,30px);font-weight:800;color:var(--gold);letter-spacing:2px;text-align:center;}
.l-sub{font-size:clamp(11px,2.8vw,13px);color:#aaa;margin-bottom:1.25rem;text-align:center;line-height:1.5;padding:0 .5rem;}
.l-photos{display:flex;gap:8px;margin-bottom:1.25rem;justify-content:center;flex-wrap:wrap;}
.l-photos img{width:clamp(54px,14vw,76px);height:clamp(70px,18vw,100px);object-fit:cover;border-radius:10px;border:2px solid rgba(255,215,0,.5);}
.l-card{background:rgba(0,0,0,.82);border:1.5px solid rgba(255,215,0,.5);border-radius:20px;padding:clamp(1.2rem,5vw,1.8rem);width:100%;max-width:380px;}
.l-lbl{font-size:13px;color:#aaa;margin-bottom:8px;display:block;}
.l-inp{width:100%;padding:16px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.25);border-radius:12px;color:#fff;font-size:24px;letter-spacing:6px;text-align:center;font-weight:700;outline:none;margin-bottom:1rem;-webkit-appearance:none;appearance:none;font-family:monospace;}
.l-inp:focus{border-color:var(--gold);}
.l-btn{width:100%;padding:16px;background:var(--gold);color:var(--dark);border:none;border-radius:12px;font-size:17px;font-weight:800;cursor:pointer;-webkit-appearance:none;appearance:none;letter-spacing:.5px;}
.l-btn:active{opacity:.85;}
.l-err{color:#ff6b6b;font-size:13px;text-align:center;margin-top:10px;min-height:20px;font-weight:600;}

/* ===== MAIN APP ===== */
#app{display:none;flex-direction:column;min-height:100vh;}
.tnav{background:rgba(0,0,0,.88);border-bottom:2px solid var(--gold);padding:calc(.65rem + var(--sat)) 1rem .65rem;display:flex;align-items:center;justify-content:space-between;gap:6px;position:sticky;top:0;z-index:50;}
.nb{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.nb-e{font-size:20px;}
.nb-t{font-size:13px;font-weight:800;color:var(--gold);letter-spacing:1px;white-space:nowrap;}
.ntabs{display:flex;gap:3px;}
.ntab{padding:7px 10px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid transparent;color:#aaa;white-space:nowrap;min-height:34px;display:flex;align-items:center;}
.ntab.active{background:var(--gold);color:var(--dark);border-color:var(--gold);}
.ntab:active{opacity:.75;}
.nd{font-size:10px;color:#555;}
.page{display:none;padding:1rem;max-width:820px;margin:0 auto;width:100%;}
.page.active{display:block;}

/* Cards & layout */
.day-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;padding:1rem;background:rgba(255,215,0,.1);border-radius:14px;border:1px solid rgba(255,215,0,.28);}
.dh-t{font-size:clamp(13px,3.8vw,17px);font-weight:800;color:var(--gold);}
.dh-s{font-size:11px;color:#aaa;margin-top:2px;}
.pb-w{height:5px;background:rgba(255,255,255,.12);border-radius:3px;margin-top:7px;width:min(150px,38vw);}
.pb-f{height:100%;background:var(--gold);border-radius:3px;transition:width .4s;}
.dh-pct{font-size:clamp(26px,7vw,36px);font-weight:800;color:var(--gold);}
.dgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:.9rem;}
.dc{background:var(--card);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:.85rem;}
.dc-lbl{font-size:10px;color:#666;margin-bottom:3px;}
.dc-val{font-size:clamp(20px,5.5vw,28px);font-weight:800;color:var(--gold);}
.dc-val.g{color:#46c864;}.dc-val.w{color:#ffa500;}.dc-val.r{color:#ff5050;}
.dc-sub{font-size:10px;color:#555;margin-top:2px;}
.dsc-card{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);border-radius:12px;padding:.8rem 1rem;margin-bottom:.85rem;}
.dsc-day{font-size:11px;color:#aaa;margin-bottom:5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.dsc-tags{display:flex;gap:6px;flex-wrap:wrap;}
.dsc-tag{padding:5px 10px;border-radius:20px;font-size:12px;font-weight:700;}
.sec{font-size:11px;font-weight:800;color:var(--gold);margin:1rem 0 .55rem;letter-spacing:1px;text-transform:uppercase;}
.sl{display:flex;flex-direction:column;gap:7px;margin-bottom:1.2rem;}
.si{display:flex;align-items:center;gap:11px;padding:13px;background:rgba(255,255,255,.04);border-radius:12px;border:1px solid rgba(255,255,255,.09);cursor:pointer;min-height:52px;}
.si:active{background:rgba(255,215,0,.08);}
.si.done{background:rgba(255,215,0,.09);border-color:rgba(255,215,0,.32);}
.si.done .si-l{text-decoration:line-through;color:#777;}
.chk{width:26px;height:26px;border-radius:50%;border:2px solid #555;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
.si.done .chk{background:var(--gold);border-color:var(--gold);color:var(--dark);}
.si-t{font-size:11px;color:#666;min-width:65px;line-height:1.3;}
.si-l{font-size:clamp(12px,3.3vw,14px);font-weight:600;color:#e0e0e0;flex:1;line-height:1.3;}
.si-b{font-size:10px;padding:3px 7px;border-radius:10px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.bg{background:rgba(255,215,0,.15);color:var(--gold);}
.bb{background:rgba(56,139,255,.15);color:#7ab8ff;}
.bv{background:rgba(168,85,247,.15);color:#c084fc;}
.cal-strip{display:flex;gap:5px;overflow-x:auto;padding-bottom:5px;margin-bottom:1rem;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.cal-strip::-webkit-scrollbar{display:none;}
.cd{flex-shrink:0;width:42px;text-align:center;padding:7px 3px;border-radius:9px;border:1px solid rgba(255,255,255,.09);background:rgba(0,0,0,.35);}
.cd.today{border-color:var(--gold);background:rgba(255,215,0,.12);}
.cd.ok{background:rgba(70,200,100,.1);border-color:rgba(70,200,100,.3);}
.cd.part{background:rgba(255,165,0,.08);border-color:rgba(255,165,0,.25);}
.cd.miss{background:rgba(255,80,80,.07);border-color:rgba(255,80,80,.2);}
.cdn{font-size:9px;color:#666;}
.cdnum{font-size:13px;font-weight:700;color:#ddd;margin:2px 0;}
.cddot{width:5px;height:5px;border-radius:50%;background:transparent;margin:0 auto;}
.cd.ok .cddot{background:#46c864;}.cd.part .cddot{background:#ffa500;}.cd.today .cddot{background:var(--gold);}
.drill-card{background:var(--card);border:1px solid rgba(255,215,0,.2);border-radius:12px;padding:.9rem;margin-bottom:.9rem;}
.drill-lbl{font-size:13px;color:#aaa;margin-bottom:7px;}
.drill-sel{width:100%;padding:11px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-size:14px;-webkit-appearance:none;appearance:none;}
.locked{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center;padding:2rem;}
.lk-i{font-size:52px;margin-bottom:1rem;}
.lk-t{font-size:clamp(15px,4.5vw,21px);font-weight:800;color:var(--gold);margin-bottom:.4rem;}
.lk-s{font-size:13px;color:#666;line-height:1.5;}

/* BIG LEARNING */
.bl-hdr{background:linear-gradient(135deg,rgba(255,215,0,.13),rgba(255,100,0,.07));border:1px solid rgba(255,215,0,.3);border-radius:14px;padding:.95rem 1rem;margin-bottom:.75rem;}
.bl-t{font-size:clamp(13px,3.8vw,16px);font-weight:800;color:var(--gold);margin-bottom:3px;}
.bl-s{font-size:11px;color:#aaa;}
.stabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.85rem;}
.stab{padding:7px 11px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid rgba(255,255,255,.15);color:#aaa;cursor:pointer;min-height:34px;}
.stab.active{background:var(--gold);color:var(--dark);border-color:var(--gold);}
.stab:active{opacity:.75;}
.qcard{background:var(--card);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:1.15rem;margin-bottom:.85rem;}
.qmeta{font-size:11px;color:#666;margin-bottom:7px;}
.qtext{font-size:clamp(13px,3.8vw,15px);font-weight:600;color:#eee;margin-bottom:1rem;line-height:1.55;}
.qopts{display:flex;flex-direction:column;gap:8px;}
.qopt{padding:12px 13px;border-radius:10px;border:1px solid rgba(255,255,255,.12);font-size:clamp(12px,3.3vw,14px);color:#ddd;cursor:pointer;background:rgba(255,255,255,.03);min-height:46px;display:flex;align-items:center;line-height:1.35;}
.qopt:active:not(.dis){border-color:var(--gold);background:rgba(255,215,0,.08);}
.qopt.cor{background:rgba(70,200,100,.15);border-color:#46c864;color:#6de890;}
.qopt.wrg{background:rgba(255,80,80,.12);border-color:#ff5050;color:#ff8080;}
.qopt.dis{cursor:default;}
.fb{text-align:center;padding:13px;border-radius:12px;font-size:clamp(17px,5vw,22px);font-weight:800;margin:.7rem 0;animation:pop .3s ease;}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.fb-g{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.4);}
.fb-w{background:rgba(255,80,80,.12);color:#ff8080;border:1px solid rgba(255,80,80,.3);}
.nbtn{width:100%;padding:14px;background:var(--gold);color:var(--dark);border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;margin-top:7px;min-height:50px;-webkit-appearance:none;appearance:none;}
.nbtn:active{opacity:.85;}
.nbtn:disabled{opacity:.4;cursor:default;}
.sc{text-align:center;padding:1.75rem 1rem;background:rgba(255,215,0,.06);border-radius:14px;border:1px solid rgba(255,215,0,.2);margin-top:.9rem;}
.sc-e{font-size:clamp(42px,11vw,58px);margin-bottom:7px;}
.sc-t{font-size:clamp(15px,4.5vw,20px);font-weight:800;color:var(--gold);}
.sc-s{font-size:13px;color:#aaa;margin-top:5px;}

/* DASHBOARD */
.wk-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:1rem;}
.wkd{background:var(--card);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:.6rem .4rem;text-align:center;}
.wkdn{font-size:10px;color:#666;margin-bottom:2px;}
.wkdp{font-size:clamp(13px,3.5vw,16px);font-weight:800;}
.wkdd{font-size:9px;color:#666;margin-top:2px;}
.bars{display:flex;flex-direction:column;gap:9px;}
.br{display:flex;flex-direction:column;gap:3px;}
.br-l{display:flex;justify-content:space-between;font-size:clamp(11px,2.8vw,12px);color:#aaa;}
.br-t{height:7px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;}
.br-f{height:100%;border-radius:4px;transition:width .5s;}
.sl-list{display:flex;flex-direction:column;gap:7px;}
.sr{display:flex;align-items:center;gap:9px;padding:11px 13px;border-radius:10px;border:1px solid rgba(255,255,255,.08);font-size:clamp(11px,2.8vw,13px);background:rgba(0,0,0,.5);}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dg{background:#46c864;}.dr{background:#ff5050;}.dy{background:var(--gold);}
.sr-n{font-weight:700;color:#ddd;flex:1;}
.sr-p{font-weight:800;font-size:clamp(11px,2.8vw,13px);text-align:right;}
.cw{position:relative;width:100%;height:170px;margin-top:.5rem;}
@media(min-width:768px){.page{padding:1.25rem;}.si{min-height:60px;}.ntab{padding:8px 14px;font-size:13px;}.nd{display:block;}.dgrid{grid-template-columns:repeat(4,1fr);}}
</style>
</head>
<body>

<div id="bg-wrap">
  <div id="bg-slides"></div>
  <div class="bg-overlay"></div>
</div>

<div id="root">
  <div id="ls">
    <div class="l-logo">&#127440;</div>
    <div class="l-title">DA GOAT SUMMER HQ</div>
    <div class="l-sub">Denrich Jr. &bull; Norland Senior High &bull; Vikings &bull; Class of 2029</div>
    <div class="l-photos" id="lph"></div>
    <div class="l-card">
      <label class="l-lbl">Enter your PIN</label>
      <input class="l-inp" id="pin" type="password" maxlength="8" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
      <button class="l-btn" id="loginbtn">Let&apos;s Get It &#127440;</button>
      <div class="l-err" id="lerr"></div>
    </div>
  </div>

  <div id="app">
    <div class="tnav">
      <div class="nb"><span class="nb-e">&#127440;</span><span class="nb-t">DA GOAT HQ</span></div>
      <div class="ntabs">
        <div class="ntab active" id="tab-sc" onclick="goPage('sc',this)">Schedule</div>
        <div class="ntab" id="tab-bl" onclick="goPage('bl',this)">Big Learning</div>
        <div class="ntab" id="tab-db" onclick="goPage('db',this)">Dashboard</div>
      </div>
      <div class="nd" id="ndt"></div>
    </div>
    <div id="pg-sc" class="page active"></div>
    <div id="pg-bl" class="page"></div>
    <div id="pg-db" class="page"></div>
  </div>
</div>

function tog(i){
  if(!D.sc[TODAY]) D.sc[TODAY]={};
  D.sc[TODAY][i] = !D.sc[TODAY][i];
  save(D); rSched();
}
function saveDrill(v){ D.dt[TODAY]=v; save(D); rSched(); }

function getWkSched(){
  const dow=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-(dow===0?6:dow-1));
  let done=0,tot=0;
  for(let i=0;i<7;i++){
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    if(d>now) break;
    const ds=d.toISOString().slice(0,10);
    const wd=d.getDay()>0&&d.getDay()<6;
    const sch=wd?WD_SCH:WE_SCH;
    const ch=D.sc[ds]||{};
    tot+=sch.length;
    done+=Object.values(ch).filter(Boolean).length;
  }
  return{done,tot,pct:tot>0?Math.round((done/tot)*100):0};
}

function buildCal(){
  const all=[...WDS,...WES].sort().slice(0,30);
  let h=`<div class="cal-strip">`;
  all.forEach(ds=>{
    const d=new Date(ds+"T12:00:00");
    const dn=["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()];
    const wd=d.getDay()>0&&d.getDay()<6;
    const sch=wd?WD_SCH:WE_SCH;
    const ch=D.sc[ds]||{};
    const dn2=Object.values(ch).filter(Boolean).length;
    const tot=sch.length;
    const isT=ds===TODAY, past=ds<TODAY;
    let cls=isT?"today":past&&dn2===0?"miss":past&&dn2<tot?"part":past?"ok":"";
    h+=`<div class="cd ${cls}"><div class="cdn">${dn}</div><div class="cdnum">${d.getDate()}</div><div class="cddot"></div></div>`;
  });
  return h+`</div>`;
}

  const plan = DAY_PLAN[DOW] || DAY_PLAN[1];
  const ids = plan.ids;

  let h=`<div class="bl-hdr"><div class="bl-t">🧠 Big Learning — ${NAME} "Da Goat" Jr.</div><div class="bl-s">Today: ${plan.names.join(" + ")} · Level ${D.lvl} · 25 questions each · Vikings 🏈</div></div>`;
  h+=`<div class="stabs">`;
  ids.forEach((sid,i)=>{
    const s=ALL_SUBJ.find(x=>x.id===sid);
    const sc=ss[sid];
    h+=`<div class="stab ${i===curS?"active":""}" onclick="switchS(${i})" style="${i===curS?"":"border-color:"+(s?s.c:"#888")+";color:"+(s?s.c:"#aaa")}">${plan.names[i]} ${sc&&sc.done?"✓":""}</div>`;
  });
  h+=`</div>`;

  const sid=ids[curS];
  const subj=ALL_SUBJ.find(x=>x.id===sid);
  const sc=ss[sid];

  if(sc&&sc.done){
    const pct=Math.round((sc.c/sc.t)*100);
    h+=`<div class="sc"><div class="sc-e">${pct>=70?"🐐":pct>=50?"💪":"📖"}</div><div class="sc-t">${pct>=70?"GOAT'D! 🐐":pct>=50?"Keep grinding! 💪":"Study up, Viking! 📖"}</div><div class="sc-s">${sc.c}/${sc.t} correct · ${pct}%</div><button class="nbtn" style="margin-top:1rem" onclick="retryS()">Try Again</button></div>`;
  } else {
    if(!curQs.length){ curQs=getQs(sid); curQI=0; }
    const q=curQs[curQI];
    h+=`<div class="qcard"><div class="qmeta">Question ${curQI+1} of 25 · ${subj?subj.l:sid}</div><div class="qtext">${q.q}</div><div class="qopts" id="qopts">${q.o.map((opt,oi)=>`<div class="qopt" id="op${oi}" onclick="pick(${oi})">${String.fromCharCode(65+oi)}. ${opt}</div>`).join("")}</div></div><div id="fb"></div><button class="nbtn" id="nbt" onclick="nxtQ()" disabled>Next Question →</button>`;
  }
  c.innerHTML=h;
  if(sc&&!sc.done&&answered) applyA();
}

function switchS(i){
  const plan=DAY_PLAN[DOW]||DAY_PLAN[1];
  curS=i; curQs=getQs(plan.ids[i]); curQI=0; answered=false; selA=null; rLearn();
}
function retryS(){
  const plan=DAY_PLAN[DOW]||DAY_PLAN[1];
  const sid=plan.ids[curS];
  ss[sid]={c:0,t:0,done:false};
  curQs=getQs(sid); curQI=0; answered=false; selA=null; rLearn();
}
function pick(idx){
  if(answered) return;
  answered=true; selA=idx;
  const plan=DAY_PLAN[DOW]||DAY_PLAN[1];
  const sid=plan.ids[curS];
  const q=curQs[curQI];
  const ok=idx===q.a;
  ss[sid].t++; if(ok) ss[sid].c++;
  if(!D.sq[TODAY]) D.sq[TODAY]={};
  if(!D.sq[TODAY][sid]) D.sq[TODAY][sid]={c:0,t:0};
  D.sq[TODAY][sid].t++; if(ok) D.sq[TODAY][sid].c++;
  save(D); applyA();
  document.getElementById("nbt").disabled=false;
}
function applyA(){
  const q=curQs[curQI];
  q.o.forEach((_,oi)=>{
    const el=document.getElementById("op"+oi); if(!el) return;
    el.classList.add("dis");
    if(oi===q.a) el.classList.add("cor");
    else if(oi===selA&&selA!==q.a) el.classList.add("wrg");
  });
  const fb=document.getElementById("fb"); if(!fb) return;
  fb.innerHTML = selA===q.a
    ? `<div class="fb fb-g">🐐 GOAT'D!</div>`
    : `<div class="fb fb-w">${WRONG[Math.floor(Math.random()*3)]}</div>`;
}
function nxtQ(){
  curQI++; answered=false; selA=null;
  const plan=DAY_PLAN[DOW]||DAY_PLAN[1];
  const sid=plan.ids[curS];
  if(curQI>=25){
    ss[sid].done=true;
    let tc=0,tt=0;
    plan.ids.forEach(s=>{if(ss[s]&&ss[s].done){tc+=ss[s].c;tt+=ss[s].t;}});
    if(tt){const p=tc/tt;if(p>=0.8&&D.lvl<5)D.lvl++;else if(p<0.5&&D.lvl>1)D.lvl=Math.max(1,D.lvl-1);save(D);}
  }
  rLearn();
}

// ---- DASHBOARD ----
function rDash(){
  const c=document.getElementById("pg-db");
  function cv(p){return p>=80?"g":p>=50?"w":"r";}

  // Schedule totals
  let atD=0,atT=0;
  [...WDS,...WES].filter(d=>d<=TODAY).forEach(ds=>{
    const wd=new Date(ds+"T12:00:00").getDay();const isW=wd>0&&wd<6;
    const sch=isW?WD_SCH:WE_SCH;const ch=D.sc[ds]||{};
    atT+=sch.length; atD+=Object.values(ch).filter(Boolean).length;
  });
  const atPct=atT>0?Math.round((atD/atT)*100):0;
  const sch0=IS_WE?WE_SCH:WD_SCH,ch0=D.sc[TODAY]||{};
  const tdD=Object.values(ch0).filter(Boolean).length,tdT=sch0.length;
  const tdPct=Math.round((tdD/tdT)*100);
  const wk=getWkSched();

  // Academic
  const ST={};ALL_SUBJ.forEach(s=>{ST[s.id]={c:0,t:0};});
  Object.values(D.sq||{}).forEach(dd=>{Object.entries(dd).forEach(([sid,v])=>{if(ST[sid]){ST[sid].c+=v.c;ST[sid].t+=v.t;}});});
  let oC=0,oT=0;ALL_SUBJ.forEach(s=>{oC+=ST[s.id].c;oT+=ST[s.id].t;});
  const acPct=oT>0?Math.round((oC/oT)*100):0;
  const tdAc=D.sq[TODAY]||{};let tC=0,tT2=0;Object.values(tdAc).forEach(v=>{tC+=v.c;tT2+=v.t;});
  const tdAcPct=tT2>0?Math.round((tC/tT2)*100):0;

  let h=`<div class="sec" style="margin-top:.4rem">📊 Overall Summary</div>
  <div class="dgrid">
    <div class="dc"><div class="dc-lbl">Schedule Today</div><div class="dc-val ${cv(tdPct)}">${tdPct}%</div><div class="dc-sub">${tdD}/${tdT} tasks</div></div>
    <div class="dc"><div class="dc-lbl">Schedule This Week</div><div class="dc-val ${cv(wk.pct)}">${wk.pct}%</div><div class="dc-sub">${wk.done}/${wk.tot} tasks</div></div>
    <div class="dc"><div class="dc-lbl">Academic Today</div><div class="dc-val ${cv(tdAcPct)}">${tdAcPct}%</div><div class="dc-sub">${tC}/${tT2} correct</div></div>
    <div class="dc"><div class="dc-lbl">Academic Overall</div><div class="dc-val ${cv(acPct)}">${acPct}%</div><div class="dc-sub">${oC}/${oT} correct</div></div>
  </div>`;

  // Weekly breakdown by day
  const dow=now.getDay();
  const mon=new Date(now);mon.setDate(now.getDate()-(dow===0?6:dow-1));
  const wkDays=[];
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    if(d>now) break;
    const ds=d.toISOString().slice(0,10);
    const isWD=d.getDay()>0&&d.getDay()<6;
    const sch=isWD?WD_SCH:WE_SCH;
    const ch=D.sc[ds]||{};
    const dn=Object.values(ch).filter(Boolean).length;
    const tot=sch.length;
    wkDays.push({name:["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()],pct:tot>0?Math.round((dn/tot)*100):0,dn,tot,isT:ds===TODAY});
  }

  h+=`<div class="sec">📅 This Week — Schedule by Day</div>`;
  if(!wkDays.length){
    h+=`<p style="font-size:13px;color:#666;padding:.5rem 0">No data yet this week.</p>`;
  } else {
    h+=`<div class="wk-grid">`;
    wkDays.forEach(d=>{
      const col=d.pct>=80?"#46c864":d.pct>=50?"#ffa500":"#ff5050";
      h+=`<div class="wkd" style="${d.isT?"border-color:rgba(255,215,0,.45)":""}">
        <div class="wkdn" style="${d.isT?"color:var(--gold)":""}">${d.name}${d.isT?" ★":""}</div>
        <div class="wkdp" style="color:${col}">${d.tot>0?d.pct+"%":"--"}</div>
        <div class="wkdd">${d.dn}/${d.tot}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  h+=`<div class="sec">📚 Subjects — All Time</div><div class="bars">`;
  ALL_SUBJ.forEach(s=>{
    const sc=ST[s.id];const pct=sc.t>0?Math.round((sc.c/sc.t)*100):0;
    const col=pct>=70?"#46c864":pct>=50?"#FFD700":"#ff5050";
    const tdSc=tdAc[s.id]||{c:0,t:0};
    const tdP=tdSc.t>0?Math.round((tdSc.c/tdSc.t)*100):null;
    h+=`<div class="br">
      <div class="br-l"><span>${s.l}</span><span style="color:${col};font-weight:800">${pct}% overall${tdP!==null?" · "+tdP+"% today":""}</span></div>
      <div class="br-t"><div class="br-f" style="width:${pct}%;background:${col}"></div></div>
    </div>`;
  });
  h+=`</div>`;

  h+=`<div class="sec" style="margin-top:1rem">🏆 Status Report</div><div class="sl-list">`;
  ALL_SUBJ.forEach(s=>{
    const sc=ST[s.id];const pct=sc.t>0?Math.round((sc.c/sc.t)*100):null;
    const dot=pct===null?"dy":pct>=70?"dg":"dr";
    const status=pct===null?"No data yet":pct>=70?"Progressing 🐐":pct>=50?"Needs work 💪":"Needs focus 📖";
    const col=dot==="dg"?"#46c864":dot==="dr"?"#ff5050":"#FFD700";
    h+=`<div class="sr"><div class="dot ${dot}"></div><span class="sr-n">${s.l}</span><span class="sr-p" style="color:${col}">${pct!==null?pct+"%":"--"} · ${status}</span></div>`;
  });
  h+=`</div>`;

  // Charts
  const wkAc={};
  Object.entries(D.sq||{}).forEach(([dt,dd])=>{
    const wn=Math.floor((new Date(dt)-new Date("2025-06-25"))/(7*86400000));
    const k="Wk "+(wn+1);
    if(!wkAc[k])wkAc[k]={c:0,t:0};
    Object.values(dd).forEach(v=>{wkAc[k].c+=v.c;wkAc[k].t+=v.t;});
  });
  const wkL=Object.keys(wkAc);
  const wkV=wkL.map(k=>wkAc[k].t>0?Math.round((wkAc[k].c/wkAc[k].t)*100):0);

  const wkScA={};
  [...WDS,...WES].filter(d=>d<=TODAY).forEach(ds=>{
    const wn=Math.floor((new Date(ds)-new Date("2025-06-25"))/(7*86400000));
    const k="Wk "+(wn+1);
    if(!wkScA[k])wkScA[k]={done:0,tot:0};
    const wd=new Date(ds+"T12:00:00").getDay();const isWd=wd>0&&wd<6;
    const sch=isWd?WD_SCH:WE_SCH;const ch=D.sc[ds]||{};
    wkScA[k].tot+=sch.length;wkScA[k].done+=Object.values(ch).filter(Boolean).length;
  });
  const wsL=Object.keys(wkScA);
  const wsV=wsL.map(k=>wkScA[k].tot>0?Math.round((wkScA[k].done/wkScA[k].tot)*100):0);

  h+=`<div class="sec" style="margin-top:1rem">📈 Weekly Academic Trend</div><div class="cw"><canvas id="tC" role="img" aria-label="Academic trend">Chart</canvas></div>`;
  h+=`<div class="sec" style="margin-top:1rem">📆 Weekly Schedule Completion</div><div class="cw"><canvas id="sC" role="img" aria-label="Schedule trend">Chart</canvas></div>`;

  c.innerHTML=h;

  if(window.Chart){
    if(wkL.length) new Chart(document.getElementById("tC"),{type:"line",data:{labels:wkL,datasets:[{label:"Academic %",data:wkV,borderColor:"#FFD700",backgroundColor:"rgba(255,215,0,.08)",fill:true,tension:.4,pointBackgroundColor:"#FFD700"}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{color:"#888",callback:v=>v+"%"},grid:{color:"rgba(255,255,255,.05)"}},x:{ticks:{color:"#888"},grid:{color:"rgba(255,255,255,.05)"}}}}});
    if(wsL.length) new Chart(document.getElementById("sC"),{type:"bar",data:{labels:wsL,datasets:[{label:"Schedule %",data:wsV,backgroundColor:"rgba(255,215,0,.2)",borderColor:"#FFD700",borderWidth:1.5,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{color:"#888",callback:v=>v+"%"},grid:{color:"rgba(255,255,255,.05)"}},x:{ticks:{color:"#888"},grid:{color:"rgba(255,255,255,.05)"}}}}});
  }
}
</script>
</body>
</html>
